name: Attest bundled action

on:
  push:
    branches:
      - main

permissions:
  contents: read

# Queue attestation runs so every push to main gets its own attestation.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  attest:
    name: Attest build provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Sign the provenance statement with the workflow's OIDC identity.
      attestations: write # Store the provenance statement in the repository's attestations.
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build action
        run: npm run build

      - name: Check bundled action
        run: |
          if [ -n "$(git status --porcelain=v1 --untracked-files=all -- dist)" ]; then
            echo "The committed action bundle is not up to date:"
            git status --short --untracked-files=all -- dist
            git diff -- dist
            exit 1
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/index.js
